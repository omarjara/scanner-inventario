<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>QR Code Scanner</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    #qr-reader {
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
      box-sizing: border-box;
      border: 1px solid #ccc !important;
    }
  </style>
</head>
<body class="bg-dark text-light">
  <nav class="navbar sticky-top navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand mx-auto" href="#"><span><i class="bi bi-card-checklist"></i></span> Inventory Form</a>
    </div>
  </nav>

  <div class="container mt-4">
    <div id="qr-reader"></div>
    <div id="qr-reader-results" class="mt-2 text-center"></div>
    <br>
    
    <form id="InventoryForm">
      <div class="mb-3 input-group">
        <span class="input-group-text bg-primary text-white"><i class="bi bi-qr-code-scan"></i></span>
        <input type="text" class="form-control" id="productCode" name="productCode" placeholder="Scan QR/Bar Code" readonly>
      </div>
      <div class="mb-3 input-group">
        <span class="input-group-text bg-primary text-white"><i class="bi bi-box-fill"></i></span>
        <input type="text" class="form-control" id="productName" name="product_name" placeholder="Enter product name">
      </div>
      <div class="mb-3 input-group">
        <span class="input-group-text bg-primary text-white"><i class="bi bi-tags-fill"></i></span>
        <select class="form-select" id="productCategory" name="product_category">
          <option disabled selected>Choose Category</option>
          <option value="electronics">Electronics</option>
          <option value="clothing">Clothing</option>
          <option value="books">Books</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="mb-3 input-group">
        <span class="input-group-text bg-primary text-white"><i class="bi bi-123"></i></span>
        <input type="number" class="form-control" id="quantity" name="quantity" placeholder="Enter quantity">
      </div>
      <div class="mb-3 input-group">
        <span class="input-group-text bg-primary text-white"><i class="bi bi-currency-dollar"></i></span>
        <input type="number" step="0.01" class="form-control" id="price" name="price" placeholder="Enter price">
      </div>
      <button type="submit" id="submitBtn" class="btn btn-primary mb-3 w-100">Submit</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js" type="text/javascript"></script>
  
  <script>
    // 1. Inicializar Lector QR
    document.addEventListener("DOMContentLoaded", function() {
      const resultContainer = document.getElementById('qr-reader-results');
      const productCodeInput = document.getElementById("productCode");
      let lastResult, countResults = 0;
      
      const html5QrcodeScanner = new Html5QrcodeScanner("qr-reader", { fps: 10, qrbox: 250 });
      
      html5QrcodeScanner.render((decodedText, decodedResult) => {
        if (decodedText !== lastResult) {
          countResults++;
          lastResult = decodedText;
          resultContainer.innerHTML = `<span class="badge bg-success">Escaneado: ${decodedText}</span>`;
          productCodeInput.value = decodedText;
        }
      }, (errorMessage) => { /* Ignorar errores de escaneo continuo */ });
    });

    // 2. Manejar el envío del formulario hacia Apps Script
    document.getElementById('InventoryForm').addEventListener('submit', function(e) {
      e.preventDefault(); // Evita que la página recargue
      
      const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwYr53-zqwboYJduMKPrNcAUvV8ft8WNFFQ4ABe_mbmzUViVHWHCJH3ulTZUabSUNCVzw/exec';
      
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.innerText = 'Enviando...';
      submitBtn.disabled = true;

      // Recolectar datos
      const formData = {
        productCode: document.getElementById('productCode').value,
        product_name: document.getElementById('productName').value,
        product_category: document.getElementById('productCategory').value,
        quantity: document.getElementById('quantity').value,
        price: document.getElementById('price').value
      };

      // Enviar datos usando Fetch (modo text/plain previene errores de CORS de Google)
      fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(formData)
      })
      .then(response => response.json())
      .then(data => {
        if(data.status === 'success') {
          // ALERTA DE ÉXITO CON SWEETALERT2
          Swal.fire({
            title: '¡Éxito!',
            text: '¡Guardado correctamente en el inventario!',
            icon: 'success',
            confirmButtonColor: '#0d6efd',
            confirmButtonText: 'Aceptar'
          });

          document.getElementById('InventoryForm').reset();
          document.getElementById('qr-reader-results').innerHTML = '';
        } else {
          // ALERTA DE ERROR CON SWEETALERT2
          Swal.fire({
            title: 'Error',
            text: 'Hubo un problema al guardar los datos.',
            icon: 'error',
            confirmButtonColor: '#dc3545',
            confirmButtonText: 'Cerrar'
          });
        }
      })
      .catch(error => {
        console.error('Error:', error);
        // ALERTA DE CONEXIÓN CON SWEETALERT2
        Swal.fire({
            title: 'Error de conexión',
            text: 'No se pudo conectar con el servidor.',
            icon: 'warning',
            confirmButtonColor: '#ffc107',
            confirmButtonText: 'Entendido'
        });
      })
      .finally(() => {
        submitBtn.innerText = 'Submit';
        submitBtn.disabled = false;
      });
    });
  </script>
</body>
</html>
